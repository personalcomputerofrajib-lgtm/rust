name: QuantumGuard Polyglot Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # 0. Setup MSVC environment
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1

    # 1. Setup Rust
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
    
    # 2. Setup Go
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    # 3. Setup Node.js (for React)
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    # 4. Build Rust Scanner
    - name: Build Rust Scanner
      run: |
        cd qg-scanner
        cargo build --release

    # 5. Build C++ Native Bridge
    - name: Build C++ Native Bridge
      run: |
        cd qg-native
        cl.exe /EHsc main.cpp /Fe:qg-native.exe user32.lib advapi32.lib iphlpapi.lib ws2_32.lib psapi.lib

    # 6. Build Go API & Rename for Sidecar
    - name: Build Go API
      run: |
        cd qg-api
        go mod tidy
        go build -o qg-api.exe main.go
        mkdir -p ../qg-desktop/src-tauri/bin
        copy qg-api.exe ../qg-desktop/src-tauri/bin/qg-api-x86_64-pc-windows-msvc.exe

    # 7. Build Rust Scanner & Rename for Sidecar
    - name: Build Rust Scanner
      run: |
        cd qg-scanner
        cargo build --release
        copy target\release\qg-scanner.exe ..\qg-desktop\src-tauri\bin\qg-scanner-x86_64-pc-windows-msvc.exe

    # 8. Build C++ Native Bridge & Rename for Sidecar
    - name: Build C++ Native Bridge
      run: |
        cd qg-native
        cl.exe /EHsc main.cpp /Fe:qg-native-x86_64-pc-windows-msvc.exe user32.lib advapi32.lib iphlpapi.lib ws2_32.lib psapi.lib
        copy qg-native-x86_64-pc-windows-msvc.exe ..\qg-desktop\src-tauri\bin\

    # 9. Build React UI
    - name: Build React UI
      run: |
        cd qg-ui
        npm install
        $env:CI = "false"
        npm run build

    # 10. Build Tauri Desktop Bundle
    - name: Build Tauri Desktop
      uses: tauri-apps/tauri-action@v0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        projectPath: qg-desktop
        tagName: v1.0.0
        releaseName: "QuantumGuard Sentinel v1.0.0"
        releaseBody: "Automated Polyglot Sentinel Build"
        releaseDraft: true
        prerelease: false

    # 11. Archive Finished Installer
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: QuantumGuard-Final-Installer
        path: qg-desktop/src-tauri/target/release/bundle/msi/*.msi
